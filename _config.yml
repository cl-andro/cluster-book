title: "The Cluster Book"
description: "Official documentation and language guide for Cluster-lang — the high-performance systems language with Pythonic readability and C++ execution speed."
baseurl: "/cluster-book"
url: "https://cl-andro.github.io"

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge

plugins:
  - jekyll-seo-tag

collections:
  chapters:
    output: true
    permalink: /:path/

defaults:
  - scope:
      path: ""
      type: "chapters"
    values:
      layout: "chapter"

# Cluster-Jekyll High-Performance Settings
cluster_engine: true
markdown: gfm
highlighter: cluster_dark_neon
